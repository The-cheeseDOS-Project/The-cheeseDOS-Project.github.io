<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cheeseDOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center border border-gray-200">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-6">cheeseDOS</h1>
        <p class="text-lg text-gray-600 leading-relaxed mb-8">
            cheeseDOS is a fully GNU, custom C written, super small under 800KB live command based operating system that loads into random access memory.
        </p>
        <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-0"
            onclick="window.location.href='https://github.com/The-cheeseDOS-Project/cheeseDOS'"
        >
            cheeseDOS on GitHub
        </button>
    </div>
</body>
</html>
